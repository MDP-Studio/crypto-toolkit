name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb13b5d0a5d9f928a7e9e4839c70d2cbed8f7 # v6.0.3
      - name: Set up Node.js
        uses: actions/setup-node@249970cdfa4971c3d2f92c25238a60b73d294b83 # v6.5.0
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run full verification
        run: npm run ci
